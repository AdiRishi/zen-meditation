version = 1
name = "moss-meditation"

[setup]
script = """
set -euo pipefail

corepack enable pnpm
pnpm install --frozen-lockfile
pnpm run prebuild
"""

[[actions]]
name = "Run IOS"
icon = "run"
command = "pnpm ios"

[[actions]]
name = "Run Android"
icon = "run"
command = "pnpm android"

[[actions]]
name = "Docs"
icon = "run"
command = "pnpm run docs:dev"

[[actions]]
name = "Check"
icon = "tool"
command = "pnpm run check"

[[actions]]
name = "Test"
icon = "test"
command = "pnpm test"

[[actions]]
name = "Typecheck"
icon = "check"
command = "pnpm typecheck"
